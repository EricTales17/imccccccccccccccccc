<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <style>
        /* Estilos básicos para deixar a página organizada */
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            padding: 20px;
            max-width: 400px;
            background-color: #f4f4f9;
        }
        .campo {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Calculadora de IMC</h2>

    <div class="campo">
        <label for="peso">Peso (kg):</label>
        <input type="number" id="peso" step="0.1" placeholder="Ex: 70.5">
    </div>

    <div class="campo">
        <label for="altura">Altura (m):</label>
        <input type="number" id="altura" step="0.01" placeholder="Ex: 1.75">
    </div>

    <button onclick="calcularIMC()">Calcular IMC</button>

    <div id="resultado"></div>

    <script>
        function calcularIMC() {
            // Captura os valores digitados nos inputs e converte para números decimais
            const peso = parseFloat(document.getElementById('peso').value);
            const altura = parseFloat(document.getElementById('altura').value);
            const resultadoDiv = document.getElementById('resultado');

            // Validação simples para garantir que os campos foram preenchidos corretamente
            if (!peso || !altura || peso <= 0 || altura <= 0) {
                resultadoDiv.innerHTML = "<span style='color: red;'>Por favor, insira valores válidos.</span>";
                return; // Para a execução da função aqui
            }

            // Cálculo do IMC (peso dividido por altura ao quadrado)
            const imc = peso / (altura * altura);
            
            // Variável para guardar o texto da classificação
            let classificacao = "";

            // Estrutura condicional idêntica à do Python para classificar o IMC
            if (imc < 18.5) {
                classificacao = "Abaixo do peso";
            } else if (imc >= 18.5 && imc < 25) {
                classificacao = "Peso normal";
            } else {
                classificacao = "Acima do peso";
            }

            // Exibe o resultado na tela formatando o IMC com duas casas decimais (.toFixed(2))
            resultadoDiv.innerHTML = `Seu IMC é: ${imc.toFixed(2)}<br>Classificação: ${classificacao}`;
        }
    </script>

</body>
</html>
